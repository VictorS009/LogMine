<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogMine</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <img src="./assets/logoprincipal.png" alt="logo logmine">
       <nav aria-label="Menu principal">
            <a href="">ENTRAR</a>
            <a href="">FORUM</a>
            <a href="">SOBRE</a>
            <a href="">MOJANG</a>
            <a href="">PERGUNTAS</a>
        </nav>
    </header>
    <main>
        <section>
            <img src="./assets/logo-sozinho.png" alt="logo logmine">
            <form action="" method="get">

                <label for="userEmail">E-mail</label>
                <input type="email" id="userEmail" name="userEmail" required autocomplete="email">
                <br>
                <label for="userPassword">Senha</label>
                <input type="password" id="userPassword" name="userPassword" required autocomplete="current-password">
                <br>
                <label>
                    <input type="checkbox" id="rememberPassword" name="rememberPassword">
                    Lembrar minha senha
                </label>
                <button type="submit">Entrar na conta</button>

            </form>

            <a href="#">Esqueceu a senha?</a>
        </section>
    </main>
    <footer>
        <ul>
            <li> <img src="./assets/Power.png" alt="Icone de energia">
                <span>Também offline</span>
            </li>

            <li> <img src="./assets/User.png" alt="Icone de usuario">
                <span>67 Jogadores</span>
            </li>

            <li> <img src="./assets/GameController.png" alt="icone de controle">
                <span>Compatível com uso remoto</span>
            </li>

            <li> <img src="./assets/Vibrate.png" alt="Icone de Celular vibrando">
                <span>Vibração no controle</span>
            </li>

            <li> <img src="./assets/Baby.png" alt="Icone de bebê">
                <span>Permitido para menores</span>
            </li>

        </ul>

    </footer>
</body>

</html>
