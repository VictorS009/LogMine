<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LogMine</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header class="cabecalho">
        <img src="./assets/logoprincipal.png" alt="logo logmine">
        <nav class="cabecalho__menu" aria-label="Menu principal">
            <a href="#">ENTRAR</a>
            <a href="#">FORUM</a>
            <a href="#">SOBRE</a>
            <a href="#">MOJANG</a>
            <a href="#">PERGUNTAS</a>
        </nav>
    </header>
    <main>
        <section class="login">
            <img class="logo" src="./assets/logo-sozinho.png" alt="logo logmine">

            <form class="login__form" action="" method="get">

                <label for="userEmail">E-mail</label>
                <input type="email" id="userEmail" name="userEmail" required autocomplete="email">

                <label for="userPassword">Senha</label>
                <div class="senha-container">
                    <input type="password" id="userPassword" name="userPassword" required minlength="8"
                        pattern="(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}"
                        title="Mínimo 8 caracteres, com letra maiúscula, minúscula e número."
                        autocomplete="current-password">
                    <button type="button" class="mostrar-senha" aria-label="Mostrar senha">👁</button>
                </div>



                <label for="rememberPassword">
                    <input type="checkbox" id="rememberPassword" name="rememberPassword">
                    Lembrar minha senha
                </label>

                <button class="entrar" type="submit">Entrar na conta</button>

            </form>

            <a class="esqueceu" href="#">Esqueceu a senha?</a>
        </section>
    </main>
    <footer class="rodape">
        <ul class="rodape__elementos">
            <li> <img src="./assets/Power.png" alt="Icone de energia">
                <span>Também offline</span>
            </li>

            <li> <img src="./assets/User.png" alt="Icone de usuario">
                <span>67 Jogadores</span>
            </li>

            <li> <img src="./assets/GameController.png" alt="icone de controle">
                <span>Compatível com uso remoto</span>
            </li>

            <li> <img src="./assets/Vibrate.png" alt="Icone de Celular vibrando">
                <span>Vibração no controle</span>
            </li>

            <li> <img src="./assets/Baby.png" alt="Icone de bebê">
                <span>Permitido para menores</span>
            </li>

        </ul>

    </footer>
    <script src="./script.js"></script>
</body>

</html>
